<!DOCTYPE html>
<html lang="fa" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد یکپارچه پاکار</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Vazirmatn', 'sans-serif'] },
                    colors: {
                        slate: { 850: '#151f32', 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #020617; color: #f8fafc; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input, textarea, select { background-color: #1e293b; color: #f1f5f9; border-color: #334155; }
        input:focus, textarea:focus, select:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 1px #3b82f6; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- لینک ابری گوگل شیت اختصاصی شما (جایگذاری شده توسط سیستم) ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzMkx_WdDRFimencpg5-Ou7GzmUjI0wiAfgajnK-u8w7aq2ujQZwd0BNnoUi1QF7xv9Ow/exec"

        // --- داده‌های اولیه استاندارد ---
        const initialData = {
            settings: { statuses: ['جاری', 'آزمایشی', 'تکمیل شده', 'متوقف', 'عقب‌افتاده', 'در صف بررسی'] },
            support: {
                lines: [
                    { id: 1, name: 'رد و تایید فرصت ها', owner: 'علی', target: '۱۲۰ مورد/هفته', current: '۱۱۵ مورد', performance: 95, status: 'جاری', challenges: 'حجم بالا در ایام تعطیل' },
                    { id: 2, name: 'احراز هویت مالی', owner: 'سارا', target: '۴۵ مورد/هفته', current: '۴۰ مورد', performance: 88, status: 'جاری', challenges: 'کندی در آپلود مدارک' }
                ],
                projects: [
                    { id: 1, name: 'تهیه هدیه های لیگ فصلی', owner: 'رضا', progress: 80, subtasks: [{title: 'سفارش هدایا', status: 'انجام شده'}, {title: 'ارسال', status: 'آغاز نشده'}], status: 'جاری', challenges: 'هماهنگی با پیک' }
                ]
            },
            content: {
                lines: [
                    { id: 1, name: 'پست های اینستاگرام', owner: 'زهرا', target: '۴ پست', current: '۳ پست', performance: 75, status: 'عقب‌افتاده', challenges: 'کمبود گرافیک' }
                ],
                projects: [
                    { id: 1, name: 'سند مفاهیم کار داوطلبانه', owner: 'محمد', progress: 50, subtasks: [{title: 'فاز ۱', status: 'انجام شده'}, {title: 'فاز ۲', status: 'در حال انجام'}], status: 'جاری', challenges: 'نیاز به ترجمه' }
                ]
            },
            marketing: {
                lines: [
                    { id: 1, name: 'تبلیغات کافه بازار', owner: 'امیر', target: '۵۰۰ نصب', current: '۴۵۰ نصب', performance: 90, status: 'جاری', challenges: '' }
                ],
                projects: [
                    { id: 1, name: 'تدوین سند استراتژی رشد', owner: 'تیم مارکتینگ', progress: 30, subtasks: [{title: 'تحقیقات بازار', status: 'انجام شده'}], status: 'جاری', challenges: '' }
                ]
            },
            pr: {
                lines: [
                    { id: 1, name: 'تماس با سازمان‌های همکار', owner: 'حسین', target: '۱۰ سازمان', current: '۵ سازمان', performance: 50, status: 'جاری', challenges: 'عدم پاسخگویی' }
                ],
                projects: [
                    { id: 1, name: 'عقد تفاهم‌نامه همراه اول', owner: 'مدیریت', progress: 90, subtasks: [], status: 'در صف بررسی', challenges: 'بروکراسی اداری' }
                ]
            },
            product: {
                lines: [
                    { id: 1, name: 'رفع باگ‌های گزارش شده', owner: 'تیم فنی', target: '۲۰ باگ', current: '۱۸ باگ', performance: 90, status: 'جاری', challenges: '' }
                ],
                projects: [
                    { id: 1, name: 'بازطراحی پروفایل کاربری', owner: 'UI/UX', progress: 60, subtasks: [{title: 'وایرفریم', status: 'انجام شده'}, {title: 'پیاده‌سازی', status: 'در حال انجام'}], status: 'جاری', challenges: '' }
                ]
            }
        };

        // --- ابزارهای کمکی ---
        const ProgressBar = ({ percent }) => {
            const p = Math.min(100, Math.max(0, Number(percent) || 0));
            const color = p >= 80 ? 'bg-green-500' : p >= 50 ? 'bg-blue-500' : 'bg-orange-500';
            return (
                <div className="flex items-center gap-2">
                    <div className="flex-1 h-2 bg-slate-800 rounded-full overflow-hidden">
                        <div className={`h-full ${color} transition-all duration-500`} style={{ width: `${p}%` }}></div>
                    </div>
                    <span className="text-xs font-bold text-slate-300 w-8">{p}%</span>
                </div>
            );
        };

        // --- کامپوننت‌های ویرایشگر محلی و داینامیک ---
        const StatusManager = ({ statuses = [], onUpdate }) => {
            const safeStatuses = Array.isArray(statuses) ? statuses : []; // کنترل خطای فرمت داده
            const [isOpen, setIsOpen] = useState(false);
            const [localStatuses, setLocalStatuses] = useState([...safeStatuses]);
            const [newStatus, setNewStatus] = useState('');

            // بروزرسانی استیت محلی وقتی که تنظیمات خارجی تغییر میکنند
            useEffect(() => { setLocalStatuses(Array.isArray(statuses) ? [...statuses] : []); }, [statuses]);

            const handleAdd = () => { if(newStatus.trim() && !localStatuses.includes(newStatus)) { setLocalStatuses([...localStatuses, newStatus.trim()]); setNewStatus(''); }};
            const handleRemove = (s) => setLocalStatuses(localStatuses.filter(x => x !== s));
            const handleSave = () => { onUpdate(localStatuses); setIsOpen(false); };

            return (
                <div className="relative inline-block ml-1">
                    <button onClick={() => setIsOpen(!isOpen)} className="text-slate-400 hover:text-blue-400 p-1" title="مدیریت وضعیت‌ها"><i className="fa-solid fa-gear text-xs"></i></button>
                    {isOpen && (
                        <div className="absolute right-0 top-6 w-48 bg-slate-800 border border-slate-600 rounded-lg shadow-xl p-3 z-50">
                            <div className="text-[10px] text-slate-400 mb-2 font-bold">لیست وضعیت‌های مجاز:</div>
                            <div className="space-y-1 mb-3 max-h-32 overflow-y-auto custom-scrollbar pr-1">
                                {localStatuses.map(s => (
                                    <div key={s} className="flex justify-between items-center text-xs bg-slate-900 px-2 py-1 rounded">
                                        <span className="text-slate-300">{s}</span>
                                        <button onClick={() => handleRemove(s)} className="text-red-400 hover:text-red-300"><i className="fa-solid fa-xmark"></i></button>
                                    </div>
                                ))}
                            </div>
                            <div className="flex gap-1 mb-2">
                                <input type="text" value={newStatus} onChange={e=>setNewStatus(e.target.value)} placeholder="وضعیت جدید" className="w-full text-xs p-1 rounded bg-slate-950 border border-slate-700" />
                                <button onClick={handleAdd} className="bg-blue-600 hover:bg-blue-500 text-white px-2 rounded"><i className="fa-solid fa-plus text-[10px]"></i></button>
                            </div>
                            <button onClick={handleSave} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-xs py-1 rounded font-bold">ذخیره تنظیمات</button>
                        </div>
                    )}
                </div>
            );
        };

        const SubtaskEditor = ({ value = [], onChange }) => {
            const safeValue = Array.isArray(value) ? value : []; // پیشگیری از خطای مپ روی دیتای قدیمی
            
            const addSubtask = () => onChange([...safeValue, { title: '', status: 'آغاز نشده' }]);
            const updateSubtask = (idx, key, val) => { const newV = [...safeValue]; newV[idx][key] = val; onChange(newV); };
            const removeSubtask = (idx) => onChange(safeValue.filter((_, i) => i !== idx));

            return (
                <div className="space-y-2 min-w-[200px] p-2 bg-slate-900 rounded-lg border border-slate-700">
                    {safeValue.map((st, i) => (
                        <div key={i} className="flex gap-1 items-center">
                            <input type="text" value={st.title || ''} onChange={e => updateSubtask(i, 'title', e.target.value)} placeholder="عنوان ساب‌تسک/مایلستون" className="w-full text-xs p-1 rounded bg-slate-950 border border-slate-700" />
                            <select value={st.status || 'آغاز نشده'} onChange={e => updateSubtask(i, 'status', e.target.value)} className="w-24 text-xs p-1 rounded bg-slate-950 border border-slate-700">
                                <option>آغاز نشده</option><option>در حال انجام</option><option>انجام شده</option><option>متوقف</option>
                            </select>
                            <button onClick={() => removeSubtask(i)} className="text-red-400 hover:text-red-300 px-1"><i className="fa-solid fa-trash text-xs"></i></button>
                        </div>
                    ))}
                    <button onClick={addSubtask} className="text-[11px] text-blue-400 font-bold hover:text-blue-300"><i className="fa-solid fa-plus"></i> افزودن مایلستون</button>
                </div>
            );
        };

        // --- بخش استاندارد (جدول جامع لاین/پروژه) ---
        const StandardSection = ({ type, title, iconClass, data = [], settings, onUpdateSettings, onSaveData }) => {
            const [isEditing, setIsEditing] = useState(false);
            const safeData = Array.isArray(data) ? data : [];
            const [localData, setLocalData] = useState([...safeData]);
            
            useEffect(() => setLocalData(Array.isArray(data) ? [...data] : []), [data]);

            const isProject = type === 'project';
            const rawStatuses = settings?.statuses;
            const availableStatuses = Array.isArray(rawStatuses) ? rawStatuses : ['جاری', 'متوقف'];

            const handleAdd = () => setLocalData([...localData, { id: Date.now() + Math.random(), name: '', owner: '', status: availableStatuses[0] || '', challenges: '', ...(isProject ? {progress: 0, subtasks: []} : {target: '', current: '', performance: 0}) }]);
            const handleRemove = (id) => setLocalData(localData.filter(item => item.id !== id));
            const handleChange = (id, key, value) => setLocalData(localData.map(item => item.id === id ? { ...item, [key]: value } : item));
            const handleSubmit = () => { onSaveData(localData); setIsEditing(false); };

            return (
                <div className="bg-slate-900/50 rounded-xl border border-slate-800 overflow-hidden mb-6 shadow-lg">
                    <div className="bg-slate-800/80 border-b border-slate-700/50 p-4 flex justify-between items-center">
                        <h3 className="font-bold text-slate-100 flex items-center gap-2 text-sm md:text-base">
                            <i className={`${iconClass} text-blue-500`}></i> {title}
                        </h3>
                        {!isEditing ? (
                            <button onClick={() => setIsEditing(true)} className="text-xs flex items-center gap-1.5 text-slate-400 hover:text-blue-400 transition-colors bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 hover:border-blue-500/50">
                                <i className="fa-solid fa-pen text-[10px]"></i> ویرایش جدول
                            </button>
                        ) : (
                            <button onClick={handleSubmit} className="text-xs flex items-center gap-1.5 bg-emerald-600/90 text-white px-4 py-1.5 rounded-lg hover:bg-emerald-500 transition-colors shadow-[0_0_10px_rgba(16,185,129,0.2)]">
                                <i className="fa-solid fa-check text-[10px]"></i> اعمال موقت تغییرات
                            </button>
                        )}
                    </div>
                
                    <div className="p-0 overflow-x-auto custom-scrollbar">
                        <table className="w-full text-right text-sm whitespace-nowrap min-w-[800px]">
                            <thead>
                                <tr className="text-slate-400 text-xs bg-slate-950/30">
                                    <th className="py-3 px-4 font-medium">عنوان {isProject ? 'پروژه' : 'لاین کاری'}</th>
                                    <th className="py-3 px-4 font-medium w-24">مسئول (Owner)</th>
                                    {!isProject && <th className="py-3 px-4 font-medium w-32">تارگت / شاخص</th>}
                                    {!isProject && <th className="py-3 px-4 font-medium w-32">آمار فعلی</th>}
                                    {isProject && <th className="py-3 px-4 font-medium w-64">مایلستون‌ها / ساب‌تسک‌ها</th>}
                                    <th className="py-3 px-4 font-medium w-32">پرفورمنس / پیشرفت</th>
                                    <th className="py-3 px-4 font-medium w-32">
                                        وضعیت 
                                        {isEditing && <StatusManager statuses={availableStatuses} onUpdate={s => onUpdateSettings('statuses', s)} />}
                                    </th>
                                    <th className="py-3 px-4 font-medium min-w-[200px]">چالش‌ها و ملاحظات</th>
                                    {isEditing && <th className="py-3 px-4 font-medium text-center w-12">حذف</th>}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-800/60">
                                {localData.map((row) => {
                                    const safeSubtasks = Array.isArray(row.subtasks) ? row.subtasks : []; // بررسی سلامت دیتای ابری
                                    return (
                                    <tr key={row.id} className="hover:bg-slate-800/30 transition-colors">
                                        <td className="py-3 px-4">
                                            {isEditing ? <input type="text" value={row.name||''} onChange={e=>handleChange(row.id, 'name', e.target.value)} className="w-full text-xs p-1.5 rounded" /> : <span className="font-bold text-slate-200">{row.name||'-'}</span>}
                                        </td>
                                        <td className="py-3 px-4">
                                            {isEditing ? <input type="text" value={row.owner||''} onChange={e=>handleChange(row.id, 'owner', e.target.value)} className="w-full text-xs p-1.5 rounded" /> : <span className="text-xs bg-slate-800 px-2 py-1 rounded text-slate-300">{row.owner||'-'}</span>}
                                        </td>
                                        
                                        {!isProject && (
                                            <>
                                                <td className="py-3 px-4">{isEditing ? <input type="text" value={row.target||''} onChange={e=>handleChange(row.id, 'target', e.target.value)} className="w-full text-xs p-1.5 rounded" /> : <span className="text-slate-300 text-xs">{row.target||'-'}</span>}</td>
                                                <td className="py-3 px-4">{isEditing ? <input type="text" value={row.current||''} onChange={e=>handleChange(row.id, 'current', e.target.value)} className="w-full text-xs p-1.5 rounded" /> : <span className="text-slate-300 text-xs">{row.current||'-'}</span>}</td>
                                            </>
                                        )}

                                        {isProject && (
                                            <td className="py-2 px-4">
                                                {isEditing ? <SubtaskEditor value={safeSubtasks} onChange={v=>handleChange(row.id, 'subtasks', v)} /> : 
                                                    <div className="space-y-1 max-h-24 overflow-y-auto custom-scrollbar">
                                                        {safeSubtasks.length > 0 ? safeSubtasks.map((st, i)=>(
                                                            <div key={i} className="text-[11px] flex items-center gap-1.5"><span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${st.status==='انجام شده'?'bg-green-500':st.status==='در حال انجام'?'bg-blue-500':'bg-slate-600'}`}></span><span className="text-slate-300">{st.title}</span><span className="text-slate-500 opacity-70">({st.status})</span></div>
                                                        )) : <span className="text-slate-600 text-xs">-</span>}
                                                    </div>
                                                }
                                            </td>
                                        )}

                                        <td className="py-3 px-4">
                                            {isEditing ? (
                                                <div className="flex flex-col justify-center min-w-[120px]">
                                                    <div className="flex items-center gap-2">
                                                        <input 
                                                            type="range" 
                                                            min="0" 
                                                            max="100" 
                                                            value={isProject ? (row.progress||0) : (row.performance||0)} 
                                                            onChange={e=>handleChange(row.id, isProject?'progress':'performance', e.target.value)} 
                                                            className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500 hover:accent-blue-400 transition-all" 
                                                        />
                                                        <span className="text-xs font-bold text-slate-300 w-8">{isProject ? (row.progress||0) : (row.performance||0)}%</span>
                                                    </div>
                                                </div>
                                            ) : (
                                                <ProgressBar percent={isProject ? row.progress : row.performance} />
                                            )}
                                        </td>

                                        <td className="py-3 px-4">
                                            {isEditing ? (
                                                <select value={row.status||''} onChange={e=>handleChange(row.id, 'status', e.target.value)} className="w-full text-xs p-1.5 rounded appearance-none">
                                                    <option value="">انتخاب...</option>
                                                    {availableStatuses.map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            ) : (
                                                <span className="text-[11px] font-bold bg-blue-900/30 text-blue-400 border border-blue-800/50 px-2 py-1 rounded">{row.status||'-'}</span>
                                            )}
                                        </td>

                                        <td className="py-3 px-4">
                                            {isEditing ? <textarea rows="2" value={row.challenges||''} onChange={e=>handleChange(row.id, 'challenges', e.target.value)} className="w-full text-xs p-1.5 rounded resize-none" placeholder="یادداشت..." /> : <div className="text-[11px] text-slate-400 max-w-xs whitespace-normal leading-relaxed">{row.challenges||'-'}</div>}
                                        </td>

                                        {isEditing && (
                                            <td className="py-3 px-4 text-center">
                                                <button onClick={() => handleRemove(row.id)} className="text-slate-500 hover:text-red-400 transition-colors p-2 bg-slate-950 rounded-lg hover:bg-slate-900"><i className="fa-solid fa-trash-can text-sm"></i></button>
                                            </td>
                                        )}
                                    </tr>
                                )})}
                            </tbody>
                        </table>
                        
                        {isEditing && (
                            <div className="p-4 border-t border-slate-800/60 bg-slate-900/30">
                                <button onClick={handleAdd} className="text-xs flex items-center gap-2 text-blue-400 hover:text-blue-300 font-bold transition-colors">
                                    <i className="fa-solid fa-plus-circle"></i> افزودن ردیف جدید
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- بخش دپارتمان ---
        const DepartmentView = ({ teamKey, departmentName, iconClass, data, settings, updateData, updateSettings }) => (
            <div id={`section-${teamKey}`} className="pt-8 pb-12 border-b border-slate-800/80 scroll-mt-20 fade-in">
                <div className="mb-6 flex items-center gap-4">
                    <div className="w-12 h-12 rounded-2xl bg-slate-900 border border-blue-500/30 text-blue-400 flex items-center justify-center text-xl shadow-[0_0_15px_rgba(59,130,246,0.15)]">
                        <i className={iconClass}></i>
                    </div>
                    <div>
                        <h2 className="text-2xl font-black text-slate-100 tracking-tight">{departmentName}</h2>
                        <p className="text-slate-500 text-xs mt-1 font-medium">پایش لاین‌های روتین و پروژه‌های در حال توسعه</p>
                    </div>
                </div>
                <StandardSection type="line" title="لاین‌های روتین (شاخص‌های عملکردی)" iconClass="fa-solid fa-chart-line" data={data?.lines || []} settings={settings} onUpdateSettings={updateSettings} onSaveData={(newData) => updateData(teamKey, { ...data, lines: newData })} />
                <StandardSection type="project" title="پروژه‌ها و توسعه (تایم‌لاین و مایلستون‌ها)" iconClass="fa-solid fa-rocket" data={data?.projects || []} settings={settings} onUpdateSettings={updateSettings} onSaveData={(newData) => updateData(teamKey, { ...data, projects: newData })} />
            </div>
        );

        // --- کامپوننت مایندمپ (درختی) ---
        const MindMapNode = ({ title, type, children }) => {
            return (
                <div className="relative flex flex-col mt-3 first:mt-0">
                    <div className="flex items-center relative z-10">
                        <div className="absolute w-6 border-t-2 border-slate-700 -right-6"></div>
                        <div className={`px-3 py-1.5 rounded-lg border shadow-md flex items-center gap-2 whitespace-nowrap
                            ${type === 'root' ? 'bg-blue-600 border-blue-400 text-white text-base font-black' : 
                              type === 'team' ? 'bg-slate-800 border-blue-500/50 text-blue-300 text-[13px] font-bold' : 
                              type === 'category' ? 'bg-slate-800 border-slate-600 text-amber-400 text-[11px] font-bold' : 
                              'bg-slate-950 border-slate-700/80 text-slate-300 text-[11px] hover:border-blue-500 transition-colors cursor-default'}`}>
                            {title}
                        </div>
                    </div>
                    {children && React.Children.toArray(children).length > 0 && (
                        <div className="relative pr-6 mt-1 flex flex-col gap-1 pb-1">
                            <div className="absolute right-0 top-0 bottom-[14px] border-r-2 border-slate-700"></div>
                            {children}
                        </div>
                    )}
                </div>
            );
        };

        const MindMapSection = ({ data }) => {
            const teams = [
                { key: 'support', name: 'تیم پشتیبانی', icon: 'fa-headset' },
                { key: 'content', name: 'محتوا و پژوهش', icon: 'fa-pen-nib' },
                { key: 'marketing', name: 'مارکتینگ و رشد', icon: 'fa-bullhorn' },
                { key: 'pr', name: 'توسعه همکاری‌ها', icon: 'fa-handshake' },
                { key: 'product', name: 'محصول و فنی', icon: 'fa-code' }
            ];

            return (
                <div id="section-mindmap" className="pt-8 pb-12 border-b border-slate-800/80 scroll-mt-20 fade-in">
                    <div className="mb-6 flex items-center gap-4">
                        <div className="w-12 h-12 rounded-2xl bg-slate-900 border border-blue-500/30 text-blue-400 flex items-center justify-center text-xl shadow-[0_0_15px_rgba(59,130,246,0.15)]">
                            <i className="fa-solid fa-sitemap"></i>
                        </div>
                        <div>
                            <h2 className="text-2xl font-black text-slate-100 tracking-tight">پاکار در یک نگاه (Mind Map)</h2>
                            <p className="text-blue-500/80 text-xs mt-1 font-medium">نمودار درختی تمام لاین‌ها و پروژه‌های سازمان (آپدیت خودکار)</p>
                        </div>
                    </div>

                    <div className="bg-slate-900/60 rounded-xl border border-slate-800 overflow-x-auto p-6 shadow-lg hover:border-slate-700 transition-colors custom-scrollbar">
                        <div className="flex gap-6 min-w-max pb-4 pr-4">
                            <div className="relative flex items-center z-10">
                                <div className="px-5 py-3 rounded-xl bg-gradient-to-l from-blue-600 to-indigo-700 text-white font-black text-sm border border-blue-400/50 shadow-[0_0_20px_rgba(59,130,246,0.3)]">پلتفرم پاکار</div>
                                <div className="absolute w-6 border-t-2 border-slate-700 -left-6 top-1/2"></div>
                            </div>
                            
                            <div className="relative flex flex-col justify-center">
                                <div className="absolute right-0 top-[28px] bottom-[28px] border-r-2 border-slate-700"></div>
                                {teams.map((team) => {
                                    const teamData = data[team.key];
                                    const lines = Array.isArray(teamData?.lines) ? teamData.lines : [];
                                    const projects = Array.isArray(teamData?.projects) ? teamData.projects : [];
                                    if (lines.length === 0 && projects.length === 0) return null;
                                    
                                    return (
                                        <MindMapNode key={team.key} title={<><i className={`fa-solid ${team.icon} opacity-80`}></i> {team.name}</>} type="team">
                                            {lines.length > 0 && (
                                                <MindMapNode title="لاین‌های روتین" type="category">
                                                    {lines.map(line => (
                                                        <MindMapNode key={`l-${line.id}`} title={line.name || 'بدون نام'} type="item" />
                                                    ))}
                                                </MindMapNode>
                                            )}
                                            {projects.length > 0 && (
                                                <MindMapNode title="پروژه‌ها و توسعه" type="category">
                                                    {projects.map(proj => (
                                                        <MindMapNode key={`p-${proj.id}`} title={proj.name || 'بدون نام'} type="item" />
                                                    ))}
                                                </MindMapNode>
                                            )}
                                        </MindMapNode>
                                    )
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- بدنه اصلی ---
        function App() {
            const [data, setData] = useState(initialData);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [notification, setNotification] = useState("");
            const [activeSection, setActiveSection] = useState('overview');

            useEffect(() => {
                if (GOOGLE_SCRIPT_URL !== "YOUR_GOOGLE_SCRIPT_WEB_APP_URL") {
                    setIsLoading(true);
                    fetch(GOOGLE_SCRIPT_URL).then(res => res.json()).then(result => {
                        // ادغام هوشمند: پیشگیری از کرش در صورت عدم تطابق ساختار قدیمی گوگل با جدید
                        if (result && !result.error && (result.support || result.settings)) { 
                            const mergedData = { 
                                ...initialData, 
                                ...result, 
                                settings: { ...initialData.settings, ...(result.settings || {}) }
                            };
                            setData(mergedData);
                            showNotification("داده‌ها همگام‌سازی شدند ✅"); 
                        } else {
                            showNotification("دیتابیس ابری خالی است. از نسخه پیش‌فرض استفاده می‌شود.");
                        }
                        setIsLoading(false);
                    }).catch(err => { 
                        showNotification("خطا در ارتباط با گوگل شیت! ❌", true); 
                        setIsLoading(false); 
                    });
                }
            }, []);

            // Scroll spy for sidebar active state
            useEffect(() => {
                const handleScroll = () => {
                    const sections = ['overview', 'mindmap', 'support', 'content', 'marketing', 'pr', 'product'];
                    let current = 'overview';
                    for (const section of sections) {
                        const element = document.getElementById(`section-${section}`);
                        if (element && window.scrollY >= (element.offsetTop - 150)) {
                            current = section;
                        }
                    }
                    setActiveSection(current);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const showNotification = (msg, isError = false) => {
                setNotification({ msg, isError });
                setTimeout(() => setNotification(""), 4000);
            };

            const updateData = (teamKey, teamData) => setData(prev => ({ ...prev, [teamKey]: teamData }));
            
            // رفع خطای احتمالی در ذخیره تنظیمات جدید
            const updateSettings = (key, val) => setData(prev => ({ 
                ...prev, 
                settings: { ...(prev.settings || {}), [key]: val } 
            }));

            const saveAllToCloud = () => {
                if (GOOGLE_SCRIPT_URL === "YOUR_GOOGLE_SCRIPT_WEB_APP_URL") { showNotification("لینک گوگل شیت تنظیم نشده است!", true); return; }
                setIsSaving(true);
                fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(data) })
                .then(() => { showNotification("تغییرات با موفقیت در فضای ابری ثبت شد ✅"); setIsSaving(false); })
                .catch(() => { showNotification("خطا در ارتباط با سرور! ❌", true); setIsSaving(false); });
            };

            const navItems = [
                { id: 'overview', label: 'چشم‌انداز مدیرعامل', icon: 'fa-solid fa-crosshairs' },
                { id: 'mindmap', label: 'پاکار در یک نگاه', icon: 'fa-solid fa-sitemap' },
                { id: 'support', label: 'تیم پشتیبانی', icon: 'fa-solid fa-headset' },
                { id: 'content', label: 'محتوا و پژوهش', icon: 'fa-solid fa-pen-nib' },
                { id: 'marketing', label: 'مارکتینگ و رشد', icon: 'fa-solid fa-bullhorn' },
                { id: 'pr', label: 'توسعه همکاری‌ها', icon: 'fa-solid fa-handshake' },
                { id: 'product', label: 'محصول و فنی', icon: 'fa-solid fa-code' },
            ];

            const scrollToSection = (id) => {
                setIsSidebarOpen(false);
                document.getElementById(`section-${id}`)?.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row text-slate-200">
                    {/* Header Mobile */}
                    <div className="md:hidden bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center sticky top-0 z-40 shadow-md">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white shadow-md shadow-blue-500/20">پ</div>
                            <h1 className="font-bold text-slate-100">داشبورد پاکار</h1>
                        </div>
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-slate-400 text-xl px-2"><i className={`fa-solid ${isSidebarOpen ? 'fa-xmark' : 'fa-bars'}`}></i></button>
                    </div>

                    {/* Sidebar */}
                    <aside className={`fixed md:sticky top-0 inset-y-0 right-0 transform ${isSidebarOpen ? 'translate-x-0' : 'translate-x-full'} md:translate-x-0 transition-transform duration-300 ease-in-out w-64 bg-slate-950 border-l border-slate-800 flex-shrink-0 z-50 flex flex-col h-screen`}>
                        <div className="hidden md:flex p-6 border-b border-slate-800/80 items-center gap-3">
                            <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-[0_0_15px_rgba(59,130,246,0.3)]">پ</div>
                            <div>
                                <h1 className="font-bold text-lg text-slate-100 tracking-tight">داشبورد پاکار</h1>
                                <p className="text-[11px] text-blue-400/80 font-medium tracking-wide">مرکز کنترل ابری (شوری مدیران)</p>
                            </div>
                        </div>
                        
                        <nav className="p-4 flex-1 space-y-1.5 overflow-y-auto custom-scrollbar">
                            {navItems.map(item => {
                                const isActive = activeSection === item.id;
                                return (
                                    <button key={item.id} onClick={() => scrollToSection(item.id)} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 text-[13px] font-medium
                                        ${isActive ? 'bg-blue-600/10 text-blue-400 border border-blue-500/20 shadow-[inset_0_0_20px_rgba(59,130,246,0.05)]' : 'text-slate-400 hover:bg-slate-900 hover:text-slate-200 border border-transparent'}`}>
                                        <i className={`${item.icon} w-5 text-center text-lg ${isActive ? 'text-blue-500 drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]' : 'opacity-70'}`}></i> {item.label}
                                    </button>
                                )
                            })}
                        </nav>

                        <div className="p-5 border-t border-slate-800/80 bg-slate-950">
                            <button onClick={saveAllToCloud} disabled={isSaving} className="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white py-3 px-4 rounded-xl text-xs font-bold transition-all shadow-[0_0_20px_rgba(59,130,246,0.2)] disabled:opacity-50">
                                <i className="fa-solid fa-cloud-arrow-up text-sm"></i> {isSaving ? "در حال ثبت..." : "ارسال نسخه نهایی به ابر"}
                            </button>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 bg-[#020617] relative">
                        {isSidebarOpen && <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 md:hidden" onClick={() => setIsSidebarOpen(false)}></div>}
                        
                        {/* Notifications */}
                        {notification && (
                            <div className="fixed top-4 left-4 right-4 sm:left-auto sm:w-80 bg-slate-800 border border-slate-700 text-slate-100 text-xs p-3.5 rounded-xl shadow-2xl z-50 flex items-center gap-3 fade-in">
                                <i className={`fa-solid ${notification.isError ? 'fa-triangle-exclamation text-red-400' : 'fa-circle-check text-emerald-400'} text-lg`}></i>
                                <span className="font-medium">{notification.msg}</span>
                            </div>
                        )}

                        {isLoading && (
                            <div className="fixed inset-0 bg-[#020617]/80 backdrop-blur-md z-50 flex flex-col items-center justify-center gap-3">
                                <div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                <span className="text-sm font-bold text-blue-400 tracking-wide animate-pulse">در حال دریافت جدیدترین داده‌ها از ابر...</span>
                            </div>
                        )}

                        <div className="p-4 md:p-8 lg:p-12 max-w-[1400px] mx-auto">
                            {/* Section: Overview */}
                            <div id="section-overview" className="mb-12 scroll-mt-24 fade-in">
                                <div className="bg-gradient-to-br from-slate-900 to-slate-800 border border-slate-700/60 rounded-3xl p-8 md:p-12 text-white shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-blue-500 opacity-5 rounded-full -mt-20 -mr-20 blur-3xl"></div>
                                    <h2 className="text-3xl md:text-4xl font-black mb-4 relative z-10 text-transparent bg-clip-text bg-gradient-to-l from-blue-300 to-indigo-400">یکپارچگی در نگاه اول</h2>
                                    <p className="text-slate-300/80 max-w-2xl leading-relaxed text-sm md:text-base font-medium relative z-10 border-r-2 border-blue-500 pr-4">این داشبورد بر اساس معماری استاندارد (لاین‌های کاری + پروژه‌های توسعه‌ای) طراحی شده است تا جلسات شوری مدیران با بالاترین بازدهی ذهنی برگزار شود. برای پایش دقیق به پایین اسکرول کنید.</p>
                                </div>
                            </div>

                            {/* Section: Mind Map */}
                            <MindMapSection data={data} />

                            {/* Departments Rendered Sequentially */}
                            <DepartmentView teamKey="support" departmentName="تیم پشتیبانی کاربران" iconClass="fa-solid fa-headset" data={data.support} settings={data.settings} updateData={updateData} updateSettings={updateSettings} />
                            <DepartmentView teamKey="content" departmentName="تیم محتوا و پژوهش" iconClass="fa-solid fa-pen-nib" data={data.content} settings={data.settings} updateData={updateData} updateSettings={updateSettings} />
                            <DepartmentView teamKey="marketing" departmentName="تیم مارکتینگ و رشد" iconClass="fa-solid fa-bullhorn" data={data.marketing} settings={data.settings} updateData={updateData} updateSettings={updateSettings} />
                            <DepartmentView teamKey="pr" departmentName="دفتر توسعه همکاری‌ها (PR)" iconClass="fa-solid fa-handshake" data={data.pr} settings={data.settings} updateData={updateData} updateSettings={updateSettings} />
                            <DepartmentView teamKey="product" departmentName="تیم محصول و فنی" iconClass="fa-solid fa-code" data={data.product} settings={data.settings} updateData={updateData} updateSettings={updateSettings} />
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
